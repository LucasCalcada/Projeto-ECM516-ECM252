version: "3"

services:
  db:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminPasswd

  db-dashboard:
    image: dpage/pgadmin4
    restart: always
    ports:
      - 9000:80
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: adminPasswd
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    depends_on:
      - db
